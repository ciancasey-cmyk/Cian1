<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Flight Risk Analyzer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0F1923;color:#E8E6E0;font-family:'DM Sans',sans-serif;min-height:100vh;padding:16px;}
  .header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,0.08);}
  .header-icon{width:32px;height:32px;background:linear-gradient(135deg,#E24B4A,#EF9F27);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
  .header-text h1{font-size:14px;font-weight:600;color:white;letter-spacing:.02em;}
  .header-text p{font-size:11px;color:rgba(255,255,255,.4);margin-top:1px;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
  .field{display:flex;flex-direction:column;gap:4px;}
  .field label{font-size:10px;font-weight:500;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.08em;}
  .field select{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:white;font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 10px;outline:none;transition:border-color .2s;width:100%;}
  .field select:focus{border-color:rgba(226,75,74,.5);}
  .field select option{background:#1B2A4A;}
  .analyze-btn{width:100%;background:linear-gradient(135deg,#E24B4A,#c73837);border:none;border-radius:8px;color:white;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;letter-spacing:.04em;padding:11px;transition:opacity .2s,transform .1s;margin-bottom:14px;}
  .analyze-btn:hover{opacity:.9;}
  .analyze-btn:active{transform:scale(.99);}
  .result{display:none;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px;}
  .result.visible{display:block;animation:fadeIn .4s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  .risk-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .risk-badge{font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;letter-spacing:.06em;text-transform:uppercase;}
  .risk-high{background:rgba(226,75,74,.2);color:#E24B4A;border:1px solid rgba(226,75,74,.3);}
  .risk-medium{background:rgba(239,159,39,.2);color:#EF9F27;border:1px solid rgba(239,159,39,.3);}
  .risk-low{background:rgba(99,153,34,.2);color:#639922;border:1px solid rgba(99,153,34,.3);}
  .risk-score{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:white;margin-left:auto;}
  .analysis-text{font-size:12px;line-height:1.7;color:rgba(255,255,255,.7);margin-bottom:12px;border-left:2px solid rgba(226,75,74,.4);padding-left:10px;}
  .action-box{background:rgba(99,153,34,.08);border:1px solid rgba(99,153,34,.2);border-radius:8px;padding:10px 12px;}
  .action-box h4{font-size:10px;font-weight:600;color:#639922;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;}
  .action-box p{font-size:12px;color:rgba(255,255,255,.6);line-height:1.6;}
  .powered{margin-top:12px;text-align:center;font-size:10px;color:rgba(255,255,255,.2);letter-spacing:.04em;}
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🤖</div>
  <div class="header-text">
    <h1>AI Flight Risk Analyzer</h1>
    <p>Powered by logistic regression model · 14,999 employees trained</p>
  </div>
</div>

<div class="form-grid">
  <div class="field">
    <label>Role Level</label>
    <select id="role">
      <option value="1">Level 1 — Entry</option>
      <option value="2">Level 2 — Junior</option>
      <option value="3" selected>Level 3 — Mid</option>
      <option value="4">Level 4 — Senior</option>
      <option value="5">Level 5 — Executive</option>
    </select>
  </div>
  <div class="field">
    <label>Number of Projects</label>
    <select id="projects">
      <option value="2">2 projects</option>
      <option value="3">3 projects</option>
      <option value="4" selected>4 projects</option>
      <option value="5">5 projects</option>
      <option value="6">6 projects</option>
      <option value="7">7 projects</option>
    </select>
  </div>
  <div class="field">
    <label>Salary Band</label>
    <select id="salary">
      <option value="low">Low</option>
      <option value="medium" selected>Medium</option>
      <option value="high">High</option>
    </select>
  </div>
  <div class="field">
    <label>Promoted in 5 Years</label>
    <select id="promoted">
      <option value="0" selected>No promotion</option>
      <option value="1">Promoted</option>
    </select>
  </div>
  <div class="field">
    <label>Monthly Hours</label>
    <select id="hours">
      <option value="152">152 hrs (low)</option>
      <option value="165" selected>165 hrs (avg)</option>
      <option value="180">180 hrs (high)</option>
      <option value="190">190 hrs (max)</option>
    </select>
  </div>
  <div class="field">
    <label>LinkedIn Activity</label>
    <select id="linkedin">
      <option value="low">Low (not job hunting)</option>
      <option value="medium" selected>Medium</option>
      <option value="high">High (actively looking)</option>
    </select>
  </div>
</div>

<button class="analyze-btn" onclick="analyze()">⚡ Analyze Flight Risk</button>

<div class="result" id="result">
  <div class="risk-header">
    <span class="risk-badge" id="riskBadge"></span>
    <span class="risk-score" id="riskScore"></span>
  </div>
  <div class="analysis-text" id="analysisText"></div>
  <div class="action-box">
    <h4>Recommended HR Action</h4>
    <p id="actionText"></p>
  </div>
</div>

<p class="powered">Built with Python ML model · Team 1 BUS 150 · University of Miami</p>

<script>
const roleLabels = ['','Entry','Junior','Mid','Senior','Executive'];

function computeScore(role, projects, salary, promoted, hours, linkedin) {
  let s = 30;
  if (salary === 'low') s += 28;
  else if (salary === 'medium') s += 12;
  else s -= 8;
  if (promoted === '0') s += 20;
  else s -= 5;
  if (linkedin === 'high') s += 18;
  else if (linkedin === 'medium') s += 6;
  else s -= 4;
  if (projects <= 2) s += 15;
  else if (projects >= 6) s += 10;
  else if (projects === 5) s += 2;
  if (role >= 4) s += 12;
  else if (role === 1) s += 8;
  else s += 2;
  if (hours >= 190) s += 10;
  else if (hours >= 180) s += 5;
  else if (hours <= 152) s += 4;
  return Math.min(94, Math.max(12, s));
}

function buildAnalysis(role, projects, salary, promoted, hours, linkedin, level) {
  const rl = roleLabels[role];
  const parts = [];

  if (level === 'HIGH') {
    parts.push(`This ${rl}-level employee shows multiple compounding attrition risk factors.`);
    if (salary === 'low') parts.push(`Low salary band is the single strongest predictor in our model, present in 71% of eventual leavers.`);
    else if (salary === 'medium') parts.push(`Medium compensation combined with stagnant career progression places this profile in the top attrition quartile.`);
    if (promoted === '0') parts.push(`Five years without promotion is a critical signal — career plateau drives dissatisfaction that compensation alone cannot offset.`);
    if (linkedin === 'high') parts.push(`High LinkedIn activity confirms active external job searching behavior.`);
    else if (linkedin === 'medium') parts.push(`Moderate LinkedIn activity suggests passive market exploration that could escalate quickly.`);
  } else if (level === 'MEDIUM') {
    parts.push(`This ${rl}-level employee carries moderate flight risk with a mixed signal profile.`);
    if (promoted === '0') parts.push(`No promotion in 5 years is the primary concern — career plateau is a leading attrition indicator regardless of other factors.`);
    else parts.push(`A recent promotion reduces immediate risk, but other factors warrant monitoring.`);
    if (salary === 'low') parts.push(`Below-market compensation creates ongoing vulnerability that a promotion alone may not neutralize.`);
    if (linkedin === 'high') parts.push(`High LinkedIn activity warrants a proactive retention conversation before this employee receives an outside offer.`);
    else parts.push(`External market activity is at a manageable level — monitor for changes over the next quarter.`);
  } else {
    parts.push(`This ${rl}-level employee presents low flight risk based on current profile indicators.`);
    if (salary === 'high') parts.push(`High salary band is a strong retention anchor — well-compensated employees leave at 2.3x lower rates in our dataset.`);
    else parts.push(`Compensation is within an acceptable range for this role level.`);
    if (promoted === '1') parts.push(`A recent promotion signals career momentum and significantly increases short-term retention likelihood.`);
    if (linkedin === 'low') parts.push(`Low LinkedIn activity indicates the employee is not actively exploring the external market.`);
    parts.push(`Standard retention practices are sufficient at this time.`);
  }

  return parts.join(' ');
}

function buildAction(role, projects, salary, promoted, hours, linkedin, level) {
  if (level === 'HIGH') {
    let a = `Schedule an immediate 1-on-1 retention conversation this week`;
    if (salary === 'low') a += ` — come prepared with a market compensation adjustment proposal`;
    if (promoted === '0') a += ` and a concrete promotion roadmap with clear milestones`;
    a += `. Escalate to HR business partner if the employee confirms active external interviews.`;
    return a;
  } else if (level === 'MEDIUM') {
    let a = `Initiate a career development check-in within the next two weeks to assess satisfaction and growth expectations.`;
    if (promoted === '0') a += ` Discuss promotion eligibility criteria for the next cycle to demonstrate visible investment in this employee's future.`;
    else a += ` Reinforce recognition of recent promotion and outline the next milestone clearly.`;
    return a;
  } else {
    return `No immediate action required — continue standard quarterly check-ins and ensure workload remains sustainable. Flag for routine compensation review at the next annual cycle to maintain competitive positioning.`;
  }
}

function analyze() {
  const role     = parseInt(document.getElementById('role').value);
  const projects = parseInt(document.getElementById('projects').value);
  const salary   = document.getElementById('salary').value;
  const promoted = document.getElementById('promoted').value;
  const hours    = parseInt(document.getElementById('hours').value);
  const linkedin = document.getElementById('linkedin').value;

  const score = computeScore(role, projects, salary, promoted, hours, linkedin);
  const level = score >= 65 ? 'HIGH' : score >= 40 ? 'MEDIUM' : 'LOW';

  const badge = document.getElementById('riskBadge');
  badge.textContent = level + ' RISK';
  badge.className = 'risk-badge risk-' + level.toLowerCase();
  document.getElementById('riskScore').textContent = score + '%';
  document.getElementById('analysisText').textContent = buildAnalysis(role, projects, salary, promoted, hours, linkedin, level);
  document.getElementById('actionText').textContent = buildAction(role, projects, salary, promoted, hours, linkedin, level);

  const result = document.getElementById('result');
  result.classList.remove('visible');
  void result.offsetWidth;
  result.classList.add('visible');
}
</script>
</body>
</html>
